<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Amir&Reem Wedding Invitation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    
    height:100vh;
}

#mainFrame{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    z-index:0;
}


.gate-container{
    position:relative;
    width:100vw;
    height:100vh;
    cursor:pointer;
    
    z-index:2;
}

.gate-half{
    position:absolute;
    top:0;
    width:50%;
    height:100%;
    background-image:url("gate.jpg");
    background-size:200% 100%;
    background-repeat:no-repeat;
    transition:transform 2s ease-in-out;
}

.left{
    left:0;
    background-position:left center;
}

.right{
    right:0;
    background-position:right center;
}

.open .left{
    transform:translateX(-100%);
}

.open .right{
    transform:translateX(100%);
}


.fade-out{
    opacity:0;
    transition:opacity 0.5s ease;
}

</style>
</head>

<body>




<div class="gate-container" id="gate">
    <div class="gate-half left"></div>
    <div class="gate-half right"></div>
</div>

<script>
const gate = document.getElementById("gate");

gate.addEventListener("click", () => {
    gate.classList.add("open");

    setTimeout(() => {
        gate.classList.add("fade-out");
        gate.style.pointerEvents = "none";

        window.location.href = "main.html";

    }, 2000); // بعد انتهاء أنيميشن فتح الباب
});
</script>

</body>
</html>
